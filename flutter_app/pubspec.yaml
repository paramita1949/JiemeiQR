name: qrscan_flutter
description: Jiemei warehouse order and inventory app.
publish_to: 'none'
version: 2.1.0+4

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  drift: ^2.32.1
  drift_sqflite: ^2.0.1
  sqlite3_flutter_libs: ^0.6.0+eol
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.32.1
  build_runner: ^2.14.1
  sqlite3: ^3.3.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/seed/embedded_stock_seed.json

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/jiemei.png
  adaptive_icon_background: "#00000000"
  adaptive_icon_foreground: assets/icon/jiemei.png
