name: JIEMEI Android CI & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark manually triggered release as pre-release'
        required: true
        default: false
        type: boolean

concurrency:
  group: jiemei-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Unit and widget tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Resolve build metadata
        id: meta
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep '^version:' flutter_app/pubspec.yaml | head -n 1 | awk '{print $2}')"
          if [ -z "$version" ]; then
            version="0.0.0+0"
          fi
          safe_version="${version//+/-}"
          short_sha="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          build_time="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          tag_name="auto-v${safe_version}-r${GITHUB_RUN_NUMBER}"
          artifact_base="jiemei-android-v${safe_version}-${short_sha}"
          apk_src="flutter_app/build/app/outputs/flutter-apk/app-release.apk"
          apk_dst="flutter_app/build/app/outputs/flutter-apk/${artifact_base}.apk"
          cp "${apk_src}" "${apk_dst}"

          release_name="洁美 Android v${safe_version} (Build ${GITHUB_RUN_NUMBER})"
          release_body_file="flutter_app/build/app/outputs/flutter-apk/release-notes.md"

          cat > "${release_body_file}" <<EOF
          ## ${release_name}

          洁美仓储端 Android 发布包。

          ### Build Information
          - Version: \`${version}\`
          - Commit: \`${GITHUB_SHA}\`
          - Branch: \`${GITHUB_REF_NAME}\`
          - Workflow Run: \`${GITHUB_RUN_NUMBER}\`
          - Built At (UTC): \`${build_time}\`

          ### Artifact
          - File: \`${artifact_base}.apk\`
          EOF

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "safe_version=${safe_version}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${artifact_base}" >> "$GITHUB_OUTPUT"
          echo "apk_path=${apk_dst}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "release_body_file=${release_body_file}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release (auto on main push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          body_path: ${{ steps.meta.outputs.release_body_file }}
          prerelease: false
          target_commitish: ${{ github.sha }}
          files: ${{ steps.meta.outputs.apk_path }}

      - name: Publish GitHub release (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          body_path: ${{ steps.meta.outputs.release_body_file }}
          prerelease: ${{ inputs.prerelease }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.meta.outputs.apk_path }}
