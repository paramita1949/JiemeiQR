name: Flutter Android Build

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish APK to GitHub Releases'
        required: true
        default: true
        type: boolean
      release_tag:
        description: 'Optional tag for release (example: v1.0.0)'
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Android scaffold
        run: flutter create --platforms=android --project-name qrscan_flutter --org com.qrscan .

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Resolve release metadata
        id: release_meta
        working-directory: .
        run: |
          set -e
          publish_release="false"
          release_tag=""
          release_name=""
          prerelease="true"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            publish_release="true"
            release_tag="${GITHUB_REF_NAME}"
            release_name="Release ${GITHUB_REF_NAME}"
            prerelease="false"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            publish_release="true"
            release_tag="main-build-${GITHUB_RUN_NUMBER}"
            release_name="Main Build ${GITHUB_RUN_NUMBER}"
            prerelease="true"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish_release }}" = "true" ]; then
            publish_release="true"
            if [ -n "${{ inputs.release_tag }}" ]; then
              release_tag="${{ inputs.release_tag }}"
              release_name="Release ${{ inputs.release_tag }}"
              prerelease="false"
            else
              release_tag="build-${GITHUB_RUN_NUMBER}"
              release_name="Build ${GITHUB_RUN_NUMBER}"
              prerelease="true"
            fi
          fi
          echo "publish_release=${publish_release}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qrscan-android-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Publish to GitHub Releases
        if: steps.release_meta.outputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          files: flutter_app/build/app/outputs/flutter-apk/app-release.apk
